name: Build & Release APK

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> local.properties
          echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" >> local.properties
          echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> local.properties
          echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> local.properties

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/PonenciApp.apk

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        run: |
          gh release create latest \
            app/build/outputs/apk/debug/PonenciApp.apk \
            --title "PonenciApp — Última versión" \
            --notes "APK de debug generada automáticamente desde el último commit en \`main\`.

          **Commit:** \`${{ github.sha }}\`

          > Para instalar, descarga \`PonenciApp.apk\` y ábrelo en tu dispositivo Android.
          > Es posible que necesites activar la instalación de apps de orígenes desconocidos."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
